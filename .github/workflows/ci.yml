name: CI

on:
push:
branches:
- main
- develop

pull_request:
branches:
- main
- develop

jobs:
lint:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-node@v4
    with:
      node-version: 18
      cache: pnpm
  - name: Enable Corepack
    run: |
      corepack enable
      corepack prepare pnpm@8.10.0 --activate
  - run: pnpm install --frozen-lockfile
  - run: pnpm lint
  - run: pnpm type-check

test:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-node@v4
    with:
      node-version: 18
      cache: pnpm
  - name: Enable Corepack
    run: |
      corepack enable
      corepack prepare pnpm@8.10.0 --activate
  - run: pnpm install --frozen-lockfile
  - run: pnpm test

build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-node@v4
    with:
      node-version: 18
      cache: pnpm
  - name: Enable Corepack
    run: |
      corepack enable
      corepack prepare pnpm@8.10.0 --activate
  - run: pnpm install --frozen-lockfile
  - run: pnpm build          path: |
            apps/api/.next
            apps/api/dist
            apps/mobile/dist
          retention-days: 7
