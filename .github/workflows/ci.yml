name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      steps:
  - uses: actions/checkout@v4

  - name: Install pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 9

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: '18'
      cache: 'pnpm'

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Lint
    run: pnpm lint

  - name: Type Check
    run: pnpm type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - steps:
  - uses: actions/checkout@v4

  - name: Install pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 9

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: '18'
      cache: 'pnpm'

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Run Tests
    run: pnpm test

  - name: Upload Coverage
    uses: codecov/codecov-action@v4
    if: always()

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    steps:
      steps:
  - uses: actions/checkout@v4

  - name: Install pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 9

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: '18'
      cache: 'pnpm'

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Build
    run: pnpm build

  - name: Upload Build Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: build-artifacts
      path: |
        apps/api/.next
        apps/api/dist
        apps/mobile/dist
      retention-days: 7