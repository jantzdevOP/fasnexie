+name: CI
+
+on:
+    push:
+    branches:
+    - main
+    - develop
+  pull_request:
+    branches:
+      - main
+      - develop
+
+jobs:
+   lint:
+    name: Lint Code
+    runs-on: ubuntu-latest
+    steps:
+     - uses: actions/checkout@v4
+     - uses: actions/setup-node@v4
+     with:
+      - node-version: '18'
+      - cache: 'pnpm'
+    - uses: pnpm/action-setup@v2
+    with:
+      - version: 8.10.0
+    - run: pnpm install --frozen-lockfile
+    - run: pnpm lint
+    - run: pnpm type-check
+
+ test:
+    name: Unit Tests
+    runs-on: ubuntu-latest
+    steps:
+    - uses: actions/checkout@v4
+    - uses: actions/setup-node@v4
+    with:
+    - node-version: '18'
+    - cache: 'pnpm'
+    - uses: pnpm/action-setup@v2
+    with:
+    - version: 8.10.0
+    - run: pnpm install --frozen-lockfile
+    - run: pnpm test
+    - uses: codecov/codecov-action@v3
+    if: always()
+
+ build:
+    name: Build All Packages
+    runs-on: ubuntu-latest
+    steps:
+    - uses: actions/checkout@v4
+    - uses: actions/setup-node@v4
+    with:
+    - node-version: '18'
+    - cache: 'pnpm'
+    - uses: pnpm/action-setup@v2
+    with:
+    - version: 8.10.0
+    - run: pnpm install --frozen-lockfile
+    - run: pnpm build
+    - uses: actions/upload-artifact@v3
+    with:
+    - name: build-artifacts
+    - path:
+    - apps/api/.next
+    - apps/api/dist
+    - apps/mobile/dist
+    - retention-days: 7