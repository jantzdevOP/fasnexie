version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fasnexi
      POSTGRES_PASSWORD: development
      POSTGRES_DB: fasnexi_dev
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: fasnexi
      MINIO_ROOT_PASSWORD: fasnexi123
    ports:
      - '9000:9000'
      - '9001:9001'

volumes:
  pg_data:
